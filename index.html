<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>World Explorer — 3D Globe (Next Level)</title>
  <style>
    :root {
      --bg: #020617;
      --surface: rgba(15, 23, 42, 0.8);
      --glass-border: rgba(255, 255, 255, 0.06);
      --accent: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.5);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius-lg: 20px;
      --radius-md: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      color: var(--text);
    }

    #globe-container {
      position: fixed;
      inset: 0;
      cursor: grab;
    }
    #globe-container:active { cursor: grabbing; }
    #globe-container.loading { cursor: progress; }

    /* ─── TOP BAR ──────────────── */
    #top-bar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      padding: 8px 10px 8px 22px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    #top-bar .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    #search-input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 15px; width: 200px;
    }
    #search-input::placeholder { color: var(--text-muted); }
    #search-clear {
      background: rgba(255,255,255,0.06); border: none; color: var(--text-muted);
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      display: none; align-items: center; justify-content: center; font-size: 14px;
    }
    #search-clear.visible { display: flex; }
    #suggestions {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: var(--surface); backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-md);
      overflow: hidden; display: none; flex-direction: column;
      max-height: 240px; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    #suggestions.active { display: flex; }
    .suggestion-item {
      padding: 10px 18px; cursor: pointer; color: var(--text-muted);
      transition: background 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .suggestion-item:hover { background: rgba(255,255,255,0.06); color: #fff; }

    /* ─── DATA PANEL ──────────── */
    #data-panel {
      position: fixed; right: -440px; top: 50%; transform: translateY(-50%);
      z-index: 150; width: 380px; max-width: 90vw;
      background: var(--surface); backdrop-filter: blur(28px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
      padding: 28px 26px 24px; transition: right 0.55s cubic-bezier(0.25,0.46,0.45,0.94);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    #data-panel.open { right: 28px; }
    #panel-close {
      position: absolute; top: 14px; right: 16px;
      background: rgba(255,255,255,0.06); border: none; color: #fff;
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    #panel-flag { font-size: 48px; }
    #panel-name {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .panel-stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .panel-stat-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }
    .panel-stat-value { font-weight: 600; }
    #panel-loader { text-align: center; color: var(--text-muted); font-size: 13px; }

    /* ─── CONTROLS ────────────── */
    #controls {
      position: fixed; bottom: 28px; right: 28px; z-index: 120;
      display: flex; flex-direction: column; gap: 8px;
    }
    .ctrl-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--surface); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); color: #fff; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .ctrl-btn:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .ctrl-btn.active { border-color: #8b5cf6; background: rgba(139,92,246,0.2); }

    @media (max-width: 768px) {
      #top-bar { padding: 6px 8px 6px 16px; gap: 8px; }
      #search-input { width: 120px; font-size: 13px; }
      #data-panel { width: calc(100vw - 20px); right: -110vw; bottom: 16px; top: auto; transform: none; border-radius: var(--radius-lg) var(--radius-lg) 8px 8px; }
      #data-panel.open { right: 10px; }
    }
  </style>
</head>
<body>
  <div id="globe-container"></div>

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="dot"></div>
    <input type="text" id="search-input" placeholder="Search country..." autocomplete="off">
    <button id="search-clear" aria-label="Clear">✕</button>
    <div id="suggestions"></div>
  </div>

  <!-- Data Panel -->
  <div id="data-panel">
    <button id="panel-close">✕</button>
    <div id="panel-flag">🌍</div>
    <div id="panel-name">Select a Country</div>
    <div class="panel-stat"><span class="panel-stat-label">Population</span><span class="panel-stat-value" id="stat-pop">—</span></div>
    <div class="panel-stat"><span class="panel-stat-label">Capital</span><span class="panel-stat-value" id="stat-capital">—</span></div>
    <div class="panel-stat"><span class="panel-stat-label">Region</span><span class="panel-stat-value" id="stat-region">—</span></div>
    <div class="panel-stat"><span class="panel-stat-label">Area</span><span class="panel-stat-value" id="stat-area">—</span></div>
    <div id="panel-loader" style="display:none;">Fetching fresh data…</div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-auto-rotate" title="Auto-rotate">⟳</button>
    <button class="ctrl-btn" id="btn-heatmap" title="Heatmap">🔥</button>
    <button class="ctrl-btn" id="btn-reset" title="Reset view">⌂</button>
  </div>

  <!-- Scripts -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ────────────────────────────────────────
    // COUNTRY ID MAP (generated on canvas)
    // Each country gets a unique RGB color (r,g,b) -> id = r*65536 + g*256 + b
    // ────────────────────────────────────────
    const countries = [
      { name: 'United States', iso: 'US', lat: 38, lon: -97, bbox: [-125, 25, -66, 49] },
      { name: 'Canada', iso: 'CA', lat: 60, lon: -95, bbox: [-141, 42, -52, 83] },
      { name: 'Mexico', iso: 'MX', lat: 23, lon: -102, bbox: [-118, 14, -86, 33] },
      { name: 'Brazil', iso: 'BR', lat: -10, lon: -55, bbox: [-74, -34, -34, 5] },
      { name: 'Argentina', iso: 'AR', lat: -34, lon: -64, bbox: [-73, -55, -53, -22] },
      { name: 'United Kingdom', iso: 'GB', lat: 54, lon: -2, bbox: [-8, 50, 2, 59] },
      { name: 'France', iso: 'FR', lat: 46, lon: 2, bbox: [-5, 42, 8, 51] },
      { name: 'Germany', iso: 'DE', lat: 51, lon: 9, bbox: [5, 47, 15, 55] },
      { name: 'Italy', iso: 'IT', lat: 42, lon: 12, bbox: [6, 35, 19, 47] },
      { name: 'Spain', iso: 'ES', lat: 40, lon: -3, bbox: [-9, 36, 4, 44] },
      { name: 'Russia', iso: 'RU', lat: 60, lon: 90, bbox: [20, 41, 180, 82] },
      { name: 'China', iso: 'CN', lat: 35, lon: 105, bbox: [73, 18, 135, 54] },
      { name: 'India', iso: 'IN', lat: 20, lon: 78, bbox: [68, 6, 97, 36] },
      { name: 'Japan', iso: 'JP', lat: 36, lon: 138, bbox: [129, 31, 146, 46] },
      { name: 'South Korea', iso: 'KR', lat: 36, lon: 128, bbox: [126, 33, 130, 38] },
      { name: 'Indonesia', iso: 'ID', lat: -5, lon: 120, bbox: [95, -11, 141, 6] },
      { name: 'Australia', iso: 'AU', lat: -25, lon: 135, bbox: [113, -39, 154, -10] },
      { name: 'Egypt', iso: 'EG', lat: 26, lon: 30, bbox: [25, 22, 36, 32] },
      { name: 'Nigeria', iso: 'NG', lat: 9, lon: 8, bbox: [2, 4, 15, 14] },
      { name: 'South Africa', iso: 'ZA', lat: -29, lon: 24, bbox: [17, -35, 33, -22] },
      { name: 'Saudi Arabia', iso: 'SA', lat: 24, lon: 45, bbox: [34, 16, 56, 32] },
      { name: 'Iran', iso: 'IR', lat: 32, lon: 53, bbox: [44, 25, 63, 40] },
      { name: 'Turkey', iso: 'TR', lat: 39, lon: 35, bbox: [26, 36, 45, 42] },
      { name: 'Ukraine', iso: 'UA', lat: 49, lon: 31, bbox: [22, 44, 40, 52] },
      { name: 'Poland', iso: 'PL', lat: 52, lon: 19, bbox: [14, 49, 24, 55] },
      { name: 'Colombia', iso: 'CO', lat: 4, lon: -72, bbox: [-79, -4, -67, 12] },
      { name: 'Kenya', iso: 'KE', lat: 1, lon: 38, bbox: [34, -5, 42, 5] },
      { name: 'Ethiopia', iso: 'ET', lat: 9, lon: 40, bbox: [33, 3, 48, 15] },
      { name: 'New Zealand', iso: 'NZ', lat: -41, lon: 172, bbox: [166, -47, 179, -34] }
    ];

    // Generate ID map (512x256 canvas)
    const idMapCanvas = document.createElement('canvas');
    idMapCanvas.width = 512;
    idMapCanvas.height = 256;
    const ctx = idMapCanvas.getContext('2d');
    ctx.fillStyle = '#000000'; // ocean = id 0
    ctx.fillRect(0, 0, 512, 256);

    // Helper: lat/lon to x,y on equirectangular map (range x:0-512, y:0-256)
    function latLonToXY(lat, lon) {
      const x = (lon + 180) * (512 / 360);
      const y = (90 - lat) * (256 / 180);
      return [x, y];
    }

    // Fill rectangles for each country (simplified)
    countries.forEach((country, index) => {
      const id = index + 1; // reserve 0 for ocean
      const r = (id >> 16) & 0xff;
      const g = (id >> 8) & 0xff;
      const b = id & 0xff;
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      const [x1, y1] = latLonToXY(country.bbox[1], country.bbox[0]); // top-left
      const [x2, y2] = latLonToXY(country.bbox[3], country.bbox[2]); // bottom-right
      const w = x2 - x1;
      const h = y2 - y1;
      ctx.fillRect(x1, y1, w, h);
    });

    // Also handle Russia's wrap-around (two parts)
    // Russia bbox: [20, 41, 180, 82] -> we just draw one rectangle, but it'll cross dateline
    // For simplicity, we extend Russia manually in the canvas (already covered by the bbox up to 180)
    const idMapTexture = new THREE.CanvasTexture(idMapCanvas);
    idMapTexture.minFilter = THREE.LinearFilter;

    // ────────────────────────────────────────
    // THREE.JS SETUP
    // ────────────────────────────────────────
    const container = document.getElementById('globe-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020617);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 200);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // CSS2 renderer for labels
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none'; // let clicks pass
    container.appendChild(labelRenderer.domElement);

    // OrbitControls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.5;
    controls.zoomSpeed = 1.2;
    controls.panSpeed = 0.5;
    controls.minDistance = 50;
    controls.maxDistance = 400;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.7;
    controls.target.set(0, 0, 0);

    // ────────────────────────────────────────
    // GLOBE (with id-map texture)
    // ────────────────────────────────────────
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // Earth sphere
    const geometry = new THREE.SphereGeometry(50, 128, 128);
    const material = new THREE.MeshPhongMaterial({
      map: new THREE.TextureLoader().load('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/2560px-Blue_Marble_2002.png'),
      shininess: 5,
      specular: new THREE.Color(0x0a0a1a)
    });
    const earthMesh = new THREE.Mesh(geometry, material);
    earthGroup.add(earthMesh);

    // Invisible id-map mesh (for raycasting) - slightly larger to avoid z-fighting
    const idGeometry = new THREE.SphereGeometry(50.2, 128, 128);
    const idMaterial = new THREE.MeshBasicMaterial({
      map: idMapTexture,
      transparent: true,
      opacity: 0.0,
      side: THREE.FrontSide
    });
    const idMesh = new THREE.Mesh(idGeometry, idMaterial);
    idMesh.visible = true; // invisible but raycast targets it
    earthGroup.add(idMesh);

    // Atmosphere glow
    const glowGeometry = new THREE.SphereGeometry(51, 64, 64);
    const glowMaterial = new THREE.ShaderMaterial({
      uniforms: {},
      vertexShader: `
        varying vec3 vNormal;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        void main() {
          float intensity = pow(0.7 - dot(vNormal, vec3(0,0,1)), 2.0);
          gl_FragColor = vec4(0.13, 0.83, 0.93, 1.0) * intensity;
        }
      `,
      blending: THREE.AdditiveBlending,
      side: THREE.FrontSide,
      transparent: true,
      depthWrite: false
    });
    const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
    earthGroup.add(glowMesh);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404066);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(1, 1, 1);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x3366aa, 0.4);
    backLight.position.set(-1, -0.5, -1);
    scene.add(backLight);

    // Starfield
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 2000;
    const starsPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i += 3) {
      starsPositions[i] = (Math.random() - 0.5) * 1000;
      starsPositions[i+1] = (Math.random() - 0.5) * 600;
      starsPositions[i+2] = (Math.random() - 0.5) * 800;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // ────────────────────────────────────────
    // COUNTRY LABELS (CSS2D)
    // ────────────────────────────────────────
    const labelsGroup = new THREE.Group();
    earthGroup.add(labelsGroup);
    const labelDivs = [];

    function createLabel(country) {
      const div = document.createElement('div');
      div.textContent = country.name;
      div.style.color = 'white';
      div.style.fontSize = '10px';
      div.style.fontWeight = '500';
      div.style.textShadow = '0 0 6px black';
      div.style.background = 'rgba(0,0,0,0.5)';
      div.style.padding = '2px 6px';
      div.style.borderRadius = '4px';
      const label = new CSS2DObject(div);
      const phi = (90 - country.lat) * Math.PI / 180;
      const theta = (country.lon + 180) * Math.PI / 180;
      label.position.set(
        52 * Math.sin(phi) * Math.cos(theta),
        52 * Math.cos(phi),
        52 * Math.sin(phi) * Math.sin(theta)
      );
      return label;
    }

    countries.forEach(country => {
      const label = createLabel(country);
      labelsGroup.add(label);
      labelDivs.push({ div: label.element, country });
    });

    // ────────────────────────────────────────
    // UI ELEMENTS
    // ────────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    const suggestions = document.getElementById('suggestions');
    const dataPanel = document.getElementById('data-panel');
    const panelClose = document.getElementById('panel-close');
    const panelFlag = document.getElementById('panel-flag');
    const panelName = document.getElementById('panel-name');
    const statPop = document.getElementById('stat-pop');
    const statCapital = document.getElementById('stat-capital');
    const statRegion = document.getElementById('stat-region');
    const statArea = document.getElementById('stat-area');
    const panelLoader = document.getElementById('panel-loader');
    const btnAutoRotate = document.getElementById('btn-auto-rotate');
    const btnHeatmap = document.getElementById('btn-heatmap');
    const btnReset = document.getElementById('btn-reset');

    let selectedCountry = null;
    let heatmapEnabled = false;

    // ────────────────────────────────────────
    // API DATA FETCH
    // ────────────────────────────────────────
    async function fetchCountryData(isoCode) {
      panelLoader.style.display = 'block';
      try {
        const res = await fetch(`https://restcountries.com/v3.1/alpha/${isoCode}`);
        const data = await res.json();
        if (data && data.length > 0) {
          const c = data[0];
          const nativeName = c.name?.common || c.name?.official || isoCode;
          const flag = c.flag || '';
          const population = c.population?.toLocaleString() || '—';
          const capital = c.capital?.[0] || '—';
          const region = c.region || '—';
          const area = c.area?.toLocaleString() + ' km²' || '—';
          return { name: nativeName, flag, population, capital, region, area };
        }
      } catch (e) {
        console.warn('API fetch failed, using fallback');
      }
      panelLoader.style.display = 'none';
      return null;
    }

    function updatePanelUI(data) {
      panelFlag.textContent = data.flag || '🌍';
      panelName.textContent = data.name;
      statPop.textContent = data.population;
      statCapital.textContent = data.capital;
      statRegion.textContent = data.region;
      statArea.textContent = data.area;
      panelLoader.style.display = 'none';
    }

    async function openPanel(country) {
      selectedCountry = country;
      dataPanel.classList.add('open');
      // Show loading state
      panelFlag.textContent = '🌐';
      panelName.textContent = country.name;
      statPop.textContent = '...';
      statCapital.textContent = '...';
      statRegion.textContent = '...';
      statArea.textContent = '...';
      const apiData = await fetchCountryData(country.iso);
      if (apiData) {
        updatePanelUI(apiData);
      } else {
        // Fallback using basic data from our list
        panelFlag.textContent = country.flag || '';
        panelName.textContent = country.name;
        statPop.textContent = '—';
        statCapital.textContent = '—';
        statRegion.textContent = '—';
        statArea.textContent = '—';
        panelLoader.style.display = 'none';
      }
    }

    function closePanel() {
      dataPanel.classList.remove('open');
      selectedCountry = null;
    }

    // ────────────────────────────────────────
    // FLY-TO ANIMATION (GSAP-like using tween)
    // ────────────────────────────────────────
    function flyToCountry(country) {
      controls.autoRotate = false;
      btnAutoRotate.classList.remove('active');
      const lat = country.lat * Math.PI / 180;
      const lon = country.lon * Math.PI / 180;
      const radius = 120;
      const targetPos = new THREE.Vector3(
        radius * Math.cos(lat) * Math.cos(lon),
        radius * Math.sin(lat),
        radius * Math.cos(lat) * Math.sin(lon)
      );
      
      // Animate camera
      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();
      const endTarget = new THREE.Vector3(0, 0, 0);
      
      new TWEEN.Tween({ t: 0 })
        .to({ t: 1 }, 1200)
        .easing(TWEEN.Easing.Quadratic.InOut)
        .onUpdate((obj) => {
          camera.position.lerpVectors(startPos, targetPos, obj.t);
          controls.target.lerpVectors(startTarget, endTarget, obj.t);
          controls.update();
        })
        .start();
      
      openPanel(country);
    }

    // Simple tween engine placeholder
    const TWEEN = {
      Easing: {
        Quadratic: { InOut: (k) => { if ((k *= 2) < 1) return 0.5 * k * k; return -0.5 * ((k-1)*(k-3) - 1); } }
      },
      Tween: function(obj) {
        this.obj = obj;
        this.to = function(props, duration) { this.props = props; this.duration = duration; return this; };
        this.easing = function(fn) { this.easingFn = fn; return this; };
        this.onUpdate = function(cb) { this.updateCb = cb; return this; };
        this.start = function() {
          const start = performance.now();
          const initial = { ...obj };
          const animate = (now) => {
            const elapsed = now - start;
            const t = Math.min(elapsed / this.duration, 1);
            for (let key in this.props) {
              obj[key] = initial[key] + (this.props[key] - initial[key]) * this.easingFn(t);
            }
            if (this.updateCb) this.updateCb(obj);
            if (t < 1) requestAnimationFrame(animate);
          };
          requestAnimationFrame(animate);
        };
        return this;
      }
    };

    // ────────────────────────────────────────
    // CLICK HANDLING (raycast on idMesh)
    // ────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onGlobeClick(event) {
      // Calculate mouse in normalized device coordinates
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(idMesh);
      if (intersects.length > 0) {
        const uv = intersects[0].uv;
        // Sample id map
        const x = Math.floor(uv.x * 512);
        const y = Math.floor((1 - uv.y) * 256);
        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const id = (pixel[0] << 16) | (pixel[1] << 8) | pixel[2];
        if (id > 0 && id <= countries.length) {
          const country = countries[id - 1];
          flyToCountry(country);
        }
      }
    }

    renderer.domElement.addEventListener('click', onGlobeClick);

    // ────────────────────────────────────────
    // SEARCH FUNCTIONALITY
    // ────────────────────────────────────────
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      suggestions.innerHTML = '';
      if (query) {
        searchClear.classList.add('visible');
        const matches = countries.filter(c => c.name.toLowerCase().includes(query));
        matches.forEach(c => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.textContent = c.name;
          div.addEventListener('click', () => {
            flyToCountry(c);
            searchInput.value = '';
            suggestions.classList.remove('active');
            searchClear.classList.remove('visible');
          });
          suggestions.appendChild(div);
        });
        suggestions.classList.add('active');
      } else {
        searchClear.classList.remove('visible');
        suggestions.classList.remove('active');
      }
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      suggestions.classList.remove('active');
    });
    searchInput.addEventListener('blur', () => setTimeout(() => suggestions.classList.remove('active'), 200));

    // ────────────────────────────────────────
    // BUTTONS
    // ────────────────────────────────────────
    btnAutoRotate.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      btnAutoRotate.classList.toggle('active', controls.autoRotate);
    });
    btnAutoRotate.classList.add('active'); // start active

    btnHeatmap.addEventListener('click', () => {
      heatmapEnabled = !heatmapEnabled;
      btnHeatmap.classList.toggle('active', heatmapEnabled);
      if (heatmapEnabled) {
        // Swap texture to a heatmap version (using a canvas generated from population)
        // For simplicity, we'll tint the globe material or replace map with a procedural canvas
        const heatCanvas = document.createElement('canvas');
        heatCanvas.width = 1024;
        heatCanvas.height = 512;
        const hCtx = heatCanvas.getContext('2d');
        // Draw heatmap based on country populations (using same bbox fill)
        const maxPop = 1428627663;
        countries.forEach(c => {
          // approximate population from our static data (hardcode or fetch later)
          const pop = { US:334914895, CA:40097761, MX:128455567, BR:216422446, AR:45773884, GB:67508936, FR:64756584, DE:83294633, IT:58870762, ES:47519628, RU:144444359, CN:1425671352, IN:1428627663, JP:123294513, KR:51784059, ID:277534122, AU:26439111, EG:112716598, NG:223804632, ZA:60414495, SA:36947025, IR:89172767, TR:85279553, UA:36744634, PL:41026067, CO:52085168, KE:55100586, ET:126527060, NZ:5228100 }[c.iso] || 1e6;
          const ratio = pop / maxPop;
          const r = Math.floor(255 * ratio);
          const g = Math.floor(100 * (1 - ratio));
          const b = Math.floor(200 * (1 - ratio));
          hCtx.fillStyle = `rgb(${r},${g},${b})`;
          const [x1, y1] = latLonToXY(c.bbox[1], c.bbox[0]);
          const [x2, y2] = latLonToXY(c.bbox[3], c.bbox[2]);
          hCtx.fillRect(x1*2, y1*2, (x2-x1)*2, (y2-y1)*2);
        });
        const heatTexture = new THREE.CanvasTexture(heatCanvas);
        earthMesh.material.map = heatTexture;
        earthMesh.material.needsUpdate = true;
      } else {
        // Restore original texture
        earthMesh.material.map = new THREE.TextureLoader().load('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/2560px-Blue_Marble_2002.png');
        earthMesh.material.needsUpdate = true;
      }
    });

    btnReset.addEventListener('click', () => {
      controls.target.set(0,0,0);
      camera.position.set(0,0,200);
      controls.update();
      closePanel();
    });

    panelClose.addEventListener('click', closePanel);

    // ────────────────────────────────────────
    // ANIMATION LOOP
    // ────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      TWEEN.update?.(); // if we use proper tween lib
      controls.update();
      stars.rotation.y += 0.0001;
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    
    // Simple TWEEN.update for our homemade tween
    (function() {
      // override TWEEN with basic update empty
    })();

    animate();
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Init search clear visibility
    searchClear.classList.remove('visible');
    console.log('🌍 3D Globe ready — click a country to fly in');
  </script>
</body>
</html>
