<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>World Explorer — Super Detail 3D Globe</title>
  <style>
    :root {
      --bg: #020617;
      --surface: rgba(15, 23, 42, 0.8);
      --accent: #22d3ee;
      --accent-purple: #8b5cf6;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-border: rgba(255,255,255,0.08);
      --radius: 20px;
      --radius-md: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #globe-container {
      position: fixed;
      inset: 0;
      cursor: grab;
    }
    #globe-container:active { cursor: grabbing; }

    /* Top bar */
    #top-bar {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; align-items: center; gap: 12px;
      background: var(--surface); backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: 50px;
      padding: 8px 12px 8px 22px; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 16px rgba(34,211,238,0.5); }
    #search-input { background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; width: 200px; }
    #search-input::placeholder { color: var(--text-muted); }
    #search-clear { background: rgba(255,255,255,0.06); border: none; color: var(--text-muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 14px; }
    #search-clear.visible { display: flex; }
    #suggestions {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: var(--surface); backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-md);
      display: none; flex-direction: column; max-height: 240px; overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    #suggestions.active { display: flex; }
    .suggestion-item {
      padding: 10px 18px; cursor: pointer; color: var(--text-muted);
      transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .suggestion-item:hover { background: rgba(255,255,255,0.06); color: #fff; }

    /* Data panel */
    #data-panel {
      position: fixed; right: -460px; top: 50%; transform: translateY(-50%);
      width: 400px; max-width: 90vw; z-index: 150;
      background: var(--surface); backdrop-filter: blur(28px);
      border: 1px solid var(--glass-border); border-radius: var(--radius);
      padding: 28px 26px 24px;
      transition: right 0.55s cubic-bezier(0.25,0.46,0.45,0.94);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; gap: 16px;
    }
    #data-panel.open { right: 28px; }
    #panel-close { position: absolute; top: 14px; right: 16px; background: rgba(255,255,255,0.06); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    #panel-flag { font-size: 48px; }
    #panel-name { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .stat-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat-value { font-weight: 600; }
    #mini-chart { width: 100%; height: 60px; margin-top: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); }

    /* Story card */
    #story-card {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: var(--surface); backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-md);
      padding: 16px 24px; z-index: 180; pointer-events: none;
      opacity: 0; transition: opacity 0.4s;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      text-align: center; font-size: 18px; font-weight: 500;
    }
    #story-card.visible { opacity: 1; }

    /* Controls */
    #controls {
      position: fixed; bottom: 28px; right: 28px; z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
    }
    .ctrl-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--surface); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); color: #fff; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .ctrl-btn:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }
    .ctrl-btn.active { border-color: var(--accent-purple); background: rgba(139,92,246,0.2); }

    /* Time slider */
    #time-slider-container {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; align-items: center; gap: 12px;
      background: var(--surface); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 50px;
      padding: 8px 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    #year-label { font-size: 14px; min-width: 40px; text-align: center; }
    input[type=range] { width: 120px; accent-color: var(--accent); }

    @media (max-width: 768px) {
      #data-panel { width: calc(100vw - 20px); right: -110vw; bottom: 16px; top: auto; transform: none; border-radius: var(--radius) var(--radius) 8px 8px; }
      #data-panel.open { right: 10px; }
      #time-slider-container { bottom: 80px; }
    }
  </style>
</head>
<body>
  <div id="globe-container"></div>

  <!-- Top bar -->
  <div id="top-bar">
    <div class="dot"></div>
    <input type="text" id="search-input" placeholder="Search country..." autocomplete="off">
    <button id="search-clear">✕</button>
    <div id="suggestions"></div>
  </div>

  <!-- Data panel -->
  <div id="data-panel">
    <button id="panel-close">✕</button>
    <div id="panel-flag">🌍</div>
    <div id="panel-name">Select a Country</div>
    <div class="stat-row"><span class="stat-label">Population</span><span class="stat-value" id="stat-pop">—</span></div>
    <div class="stat-row"><span class="stat-label">Capital</span><span class="stat-value" id="stat-cap">—</span></div>
    <div class="stat-row"><span class="stat-label">Region</span><span class="stat-value" id="stat-region">—</span></div>
    <div class="stat-row"><span class="stat-label">Area</span><span class="stat-value" id="stat-area">—</span></div>
    <div class="stat-row"><span class="stat-label">Languages</span><span class="stat-value" id="stat-lang">—</span></div>
    <div class="stat-row"><span class="stat-label">Currencies</span><span class="stat-value" id="stat-curr">—</span></div>
    <canvas id="mini-chart" width="300" height="60"></canvas>
  </div>

  <!-- Story card -->
  <div id="story-card"></div>

  <!-- Controls -->
  <div id="controls">
    <button class="ctrl-btn active" id="btn-auto-rotate" title="Auto-rotate">⟳</button>
    <button class="ctrl-btn" id="btn-heatmap" title="Heatmap">🔥</button>
    <button class="ctrl-btn" id="btn-reset" title="Reset view">⌂</button>
  </div>

  <!-- Time slider -->
  <div id="time-slider-container">
    <span id="time-label">Year</span>
    <input type="range" id="time-slider" min="1960" max="2024" value="2024" step="1">
    <span id="year-label">2024</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    gsap.registerPlugin(ScrollTrigger);

    // ────────────────────────────────────────
    // GLOBAL DATA
    // ────────────────────────────────────────
    const countries = [];
    let countryDataMap = {};
    let maxPopulation = 1;
    let selectedCountry = null;
    let hoveredCountryId = 0;
    let currentYear = 2024;
    let dataMode = 'population'; // population | gdp | density
    let heatmapEnabled = false;
    let heatmapTexture;

    // ────────────────────────────────────────
    // FETCH ALL COUNTRIES (REST API)
    // ────────────────────────────────────────
    async function loadCountries() {
      try {
        const res = await fetch('https://restcountries.com/v3.1/all');
        const data = await res.json();
        data.forEach(c => {
          if (!c.latlng || c.latlng.length !== 2) return;
          const iso = c.cca3;
          const name = c.name.common;
          const flag = c.flag;
          const population = c.population || 0;
          const capital = c.capital?.[0] || '';
          const region = c.region || '';
          const area = c.area || 0;
          const languages = c.languages ? Object.values(c.languages).join(', ') : '';
          const currencies = c.currencies ? Object.keys(c.currencies).map(k => c.currencies[k].name).join(', ') : '';
          const lat = c.latlng[0];
          const lon = c.latlng[1];
          const density = area > 0 ? population / area : 0;
          const gdp = c.gdp || 0; // not always present
          countries.push({ iso, name, lat, lon, flag, population, capital, region, area, languages, currencies, density, gdp });
          countryDataMap[iso] = { name, flag, population, capital, region, area, languages, currencies, density, gdp };
        });
        maxPopulation = Math.max(...countries.map(c => c.population), 1);
        console.log(`Loaded ${countries.length} countries`);
      } catch (e) {
        console.warn('API failed, using minimal fallback');
        insertFallback();
      }
    }

    function insertFallback() {
      const fb = [
        { iso:'US', name:'United States', lat:38, lon:-97, flag:'🇺🇸', population:334914895, capital:'Washington D.C.', region:'Americas', area:9833520 },
        { iso:'CN', name:'China', lat:35, lon:105, flag:'🇨🇳', population:1425671352, capital:'Beijing', region:'Asia', area:9596961 },
        { iso:'IN', name:'India', lat:20, lon:78, flag:'🇮🇳', population:1428627663, capital:'New Delhi', region:'Asia', area:3287263 },
        { iso:'BR', name:'Brazil', lat:-10, lon:-55, flag:'🇧🇷', population:216422446, capital:'Brasília', region:'Americas', area:8515767 },
        { iso:'GB', name:'United Kingdom', lat:54, lon:-2, flag:'🇬🇧', population:67508936, capital:'London', region:'Europe', area:243610 },
        { iso:'FR', name:'France', lat:46, lon:2, flag:'🇫🇷', population:64756584, capital:'Paris', region:'Europe', area:643801 },
        { iso:'DE', name:'Germany', lat:51, lon:9, flag:'🇩🇪', population:83294633, capital:'Berlin', region:'Europe', area:357114 },
        { iso:'JP', name:'Japan', lat:36, lon:138, flag:'🇯🇵', population:123294513, capital:'Tokyo', region:'Asia', area:377975 },
        { iso:'AU', name:'Australia', lat:-25, lon:135, flag:'🇦🇺', population:26439111, capital:'Canberra', region:'Oceania', area:7692024 },
        { iso:'ZA', name:'South Africa', lat:-29, lon:24, flag:'🇿🇦', population:60414495, capital:'Pretoria', region:'Africa', area:1221037 }
      ];
      fb.forEach(c => {
        countries.push(c);
        countryDataMap[c.iso] = c;
      });
      maxPopulation = Math.max(...countries.map(c => c.population), 1);
    }

    // ────────────────────────────────────────
    // ID MAP GENERATION (1024x512 canvas)
    // ────────────────────────────────────────
    const idCanvas = document.createElement('canvas');
    idCanvas.width = 1024;
    idCanvas.height = 512;
    const ctx = idCanvas.getContext('2d');
    function latLonToPixel(lat, lon) {
      const x = (lon + 180) * (1024 / 360);
      const y = (90 - lat) * (512 / 180);
      return [x, y];
    }
    function buildIdMap() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0,0,1024,512);
      countries.forEach((c, idx) => {
        const id = idx + 1;
        const r = (id >> 16) & 0xff;
        const g = (id >> 8) & 0xff;
        const b = id & 0xff;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        const [x, y] = latLonToPixel(c.lat, c.lon);
        // Radius proportional to sqrt(area) so that larger countries have larger click targets
        const area = c.area || 50000;
        const baseRadius = Math.max(6, Math.sqrt(area) * 0.015);
        ctx.beginPath();
        ctx.arc(x, y, baseRadius, 0, Math.PI*2);
        ctx.fill();
      });
    }

    // ────────────────────────────────────────
    // THREE.JS SETUP
    // ────────────────────────────────────────
    const container = document.getElementById('globe-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020617);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,0,200);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.5;
    controls.zoomSpeed = 1.2;
    controls.minDistance = 60;
    controls.maxDistance = 350;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;

    // ────────────────────────────────────────
    // GLOBE WITH CUSTOM SHADER (base + heatmap + highlight)
    // ────────────────────────────────────────
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    const textureLoader = new THREE.TextureLoader();
    const baseTexture = textureLoader.load('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/2560px-Blue_Marble_2002.png');
    const idTexture = new THREE.CanvasTexture(idCanvas);
    
    // Heatmap canvas
    const heatCanvas = document.createElement('canvas');
    heatCanvas.width = 1024;
    heatCanvas.height = 512;
    const hctx = heatCanvas.getContext('2d');
    function generateHeatTexture(year) {
      hctx.clearRect(0,0,1024,512);
      const maxVal = dataMode === 'population' ? maxPopulation : 
                     (dataMode === 'density' ? Math.max(...countries.map(c=>c.density||0),1) : 
                      Math.max(...countries.map(c=>c.gdp||0),1));
      countries.forEach(c => {
        let value;
        if (dataMode === 'population') {
          // Simulate historical growth
          const growthRate = 0.01 + Math.random()*0.02; // random growth per country
          value = c.population * Math.exp(growthRate * (year - 2024));
        } else if (dataMode === 'density') {
          const growthRate = 0.005 + Math.random()*0.01;
          value = (c.density || 0) * Math.exp(growthRate * (year - 2024));
        } else {
          value = c.gdp || c.population * 1000; // fallback
        }
        const ratio = Math.min(Math.max(value / maxVal, 0), 1);
        const r = Math.floor(255 * ratio);
        const g = Math.floor(120 * (1 - ratio));
        const b = Math.floor(200 * (1 - ratio));
        hctx.fillStyle = `rgb(${r},${g},${b})`;
        const [x, y] = latLonToPixel(c.lat, c.lon);
        const area = c.area || 100000;
        const radius = Math.max(4, Math.sqrt(area) * 0.012);
        hctx.beginPath();
        hctx.arc(x, y, radius, 0, Math.PI*2);
        hctx.fill();
      });
      return new THREE.CanvasTexture(heatCanvas);
    }
    heatmapTexture = generateHeatTexture(2024);

    // Custom shader
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vNormal;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    const fragmentShader = `
      uniform sampler2D baseTexture;
      uniform sampler2D heatTexture;
      uniform sampler2D idTexture;
      uniform float blend;
      uniform int hoverId;
      varying vec2 vUv;
      varying vec3 vNormal;
      void main() {
        vec4 baseColor = texture2D(baseTexture, vUv);
        vec4 heatColor = texture2D(heatTexture, vUv);
        vec4 color = mix(baseColor, heatColor, blend);
        // Highlight hovered country
        if (hoverId > 0) {
          vec4 idColor = texture2D(idTexture, vUv);
          int id = int(idColor.r * 255.0) * 65536 + int(idColor.g * 255.0) * 256 + int(idColor.b * 255.0);
          if (id == hoverId) {
            color.rgb = mix(color.rgb, vec3(0.5, 1.0, 1.0), 0.7);
          }
        }
        float light = 0.3 + 0.7 * max(0.0, dot(vNormal, vec3(0.5,0.8,0.3)));
        gl_FragColor = vec4(color.rgb * light, 1.0);
      }
    `;
    const uniforms = {
      baseTexture: { value: baseTexture },
      heatTexture: { value: heatmapTexture },
      idTexture: { value: idTexture },
      blend: { value: 0.0 },
      hoverId: { value: 0 }
    };
    const earthMat = new THREE.ShaderMaterial({
      uniforms,
      vertexShader,
      fragmentShader,
      side: THREE.FrontSide
    });
    const geometry = new THREE.SphereGeometry(50, 128, 128);
    const earthMesh = new THREE.Mesh(geometry, earthMat);
    earthGroup.add(earthMesh);

    // Atmosphere glow
    const glowGeo = new THREE.SphereGeometry(51, 64, 64);
    const glowMat = new THREE.ShaderMaterial({
      vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `varying vec3 vNormal; void main() { float intensity = pow(0.75 - dot(vNormal, vec3(0,0,1)), 2.5); gl_FragColor = vec4(0.13,0.83,0.93,1.0) * intensity; }`,
      blending: THREE.AdditiveBlending,
      side: THREE.FrontSide,
      transparent: true,
      depthWrite: false
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    earthGroup.add(glowMesh);

    // Lighting
    scene.add(new THREE.AmbientLight(0x404066));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(1,1,1);
    scene.add(dirLight);

    // Stars
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = new Float32Array(2000*3);
    for (let i=0;i<2000*3;i+=3) { starsPos[i]=(Math.random()-0.5)*1000; starsPos[i+1]=(Math.random()-0.5)*600; starsPos[i+2]=(Math.random()-0.5)*800; }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos,3));
    const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff, size:0.5}));
    scene.add(stars);

    // ────────────────────────────────────────
    // LABELS
    // ────────────────────────────────────────
    const labelsGroup = new THREE.Group();
    earthGroup.add(labelsGroup);
    function createLabels() {
      while(labelsGroup.children.length) labelsGroup.remove(labelsGroup.children[0]);
      countries.forEach(c => {
        const div = document.createElement('div');
        div.textContent = c.name;
        div.style.cssText = 'color:white; font-size:9px; font-weight:500; text-shadow:0 0 6px black; background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:4px;';
        const label = new CSS2DObject(div);
        const phi = (90 - c.lat) * Math.PI/180;
        const theta = (c.lon + 180) * Math.PI/180;
        label.position.set(52*Math.sin(phi)*Math.cos(theta), 52*Math.cos(phi), 52*Math.sin(phi)*Math.sin(theta));
        labelsGroup.add(label);
      });
    }

    // ────────────────────────────────────────
    // RAYCASTING FOR HOVER & CLICK
    // ────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const idMesh = new THREE.Mesh(new THREE.SphereGeometry(50.2, 128, 128), new THREE.MeshBasicMaterial({ map: idTexture, transparent: true, opacity: 0, side: THREE.FrontSide }));
    earthGroup.add(idMesh); // hidden, for raycasting

    function getCountryIdFromUV(uv) {
      const x = Math.floor(uv.x * 1024);
      const y = Math.floor((1 - uv.y) * 512);
      const pixel = ctx.getImageData(x, y, 1, 1).data;
      return (pixel[0] << 16) | (pixel[1] << 8) | pixel[2];
    }

    function onMouseMove(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(idMesh);
      if (intersects.length > 0) {
        const id = getCountryIdFromUV(intersects[0].uv);
        if (id !== hoveredCountryId) {
          hoveredCountryId = id;
          uniforms.hoverId.value = id;
          if (id > 0 && id <= countries.length) {
            document.getElementById('globe-container').style.cursor = 'pointer';
          } else {
            document.getElementById('globe-container').style.cursor = 'grab';
          }
        }
      } else {
        if (hoveredCountryId !== 0) {
          hoveredCountryId = 0;
          uniforms.hoverId.value = 0;
          document.getElementById('globe-container').style.cursor = 'grab';
        }
      }
    }

    function onClick(event) {
      if (hoveredCountryId > 0 && hoveredCountryId <= countries.length) {
        const country = countries[hoveredCountryId-1];
        flyToCountry(country);
      }
    }

    renderer.domElement.addEventListener('mousemove', onMouseMove);
    renderer.domElement.addEventListener('click', onClick);

    // ────────────────────────────────────────
    // FLY-TO ANIMATION
    // ────────────────────────────────────────
    function flyToCountry(country) {
      controls.autoRotate = false;
      document.getElementById('btn-auto-rotate').classList.remove('active');
      const lat = country.lat * Math.PI/180;
      const lon = country.lon * Math.PI/180;
      const targetPos = new THREE.Vector3(
        130 * Math.cos(lat) * Math.cos(lon),
        130 * Math.sin(lat),
        130 * Math.cos(lat) * Math.sin(lon)
      );
      gsap.to(camera.position, {
        x: targetPos.x, y: targetPos.y, z: targetPos.z,
        duration: 1.2, ease: 'power2.inOut',
        onUpdate: () => controls.update()
      });
      gsap.to(controls.target, {
        x: 0, y: 0, z: 0,
        duration: 1.2, ease: 'power2.inOut'
      });
      openPanel(country);
    }

    // ────────────────────────────────────────
    // DATA PANEL & MINI CHART
    // ────────────────────────────────────────
    const panel = document.getElementById('data-panel');
    const panelFlag = document.getElementById('panel-flag');
    const panelName = document.getElementById('panel-name');
    const statPop = document.getElementById('stat-pop');
    const statCap = document.getElementById('stat-cap');
    const statRegion = document.getElementById('stat-region');
    const statArea = document.getElementById('stat-area');
    const statLang = document.getElementById('stat-lang');
    const statCurr = document.getElementById('stat-curr');
    const miniChartCanvas = document.getElementById('mini-chart');
    const chartCtx = miniChartCanvas.getContext('2d');

    function openPanel(country) {
      selectedCountry = country;
      const data = countryDataMap[country.iso] || {};
      panelFlag.textContent = data.flag || '';
      panelName.textContent = data.name;
      statPop.textContent = data.population?.toLocaleString() || '—';
      statCap.textContent = data.capital || '—';
      statRegion.textContent = data.region || '—';
      statArea.textContent = data.area ? data.area.toLocaleString() + ' km²' : '—';
      statLang.textContent = data.languages || '—';
      statCurr.textContent = data.currencies || '—';
      drawMiniChart(country);
      panel.classList.add('open');
    }

    function closePanel() {
      panel.classList.remove('open');
      selectedCountry = null;
    }

    function drawMiniChart(country) {
      const w = 300, h = 60;
      chartCtx.clearRect(0,0,w,h);
      const data = [];
      for (let y = 1960; y <= 2024; y+=5) {
        const growthRate = 0.01 + Math.random()*0.02;
        const pop = country.population * Math.exp(growthRate * (y - 2024));
        data.push({ year: y, value: pop });
      }
      const maxVal = Math.max(...data.map(d=>d.value));
      chartCtx.beginPath();
      chartCtx.strokeStyle = '#22d3ee';
      chartCtx.lineWidth = 2;
      data.forEach((d, i) => {
        const x = (i / (data.length-1)) * w;
        const y = h - (d.value / maxVal) * h;
        if (i===0) chartCtx.moveTo(x,y);
        else chartCtx.lineTo(x,y);
      });
      chartCtx.stroke();
    }

    document.getElementById('panel-close').addEventListener('click', closePanel);

    // ────────────────────────────────────────
    // SEARCH
    // ────────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    const suggestions = document.getElementById('suggestions');
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      suggestions.innerHTML = '';
      if (q) {
        searchClear.classList.add('visible');
        const matches = countries.filter(c => c.name.toLowerCase().includes(q));
        matches.forEach(c => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.textContent = `${c.flag || ''} ${c.name}`;
          div.addEventListener('click', () => {
            flyToCountry(c);
            searchInput.value = '';
            suggestions.classList.remove('active');
            searchClear.classList.remove('visible');
          });
          suggestions.appendChild(div);
        });
        suggestions.classList.add('active');
      } else {
        searchClear.classList.remove('visible');
        suggestions.classList.remove('active');
      }
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      suggestions.classList.remove('active');
    });

    // ────────────────────────────────────────
    // STORY SCROLL (ScrollTrigger)
    // ────────────────────────────────────────
    const storyCard = document.getElementById('story-card');
    const storySteps = [
      { lat: 30, lon: -100, text: 'North America' },
      { lat: -10, lon: -60, text: 'South America' },
      { lat: 50, lon: 10, text: 'Europe' },
      { lat: 30, lon: 80, text: 'Asia' },
      { lat: -25, lon: 135, text: 'Oceania' },
      { lat: 5, lon: 20, text: 'Africa' }
    ];
    // Create a dummy scroll container
    const scrollContainer = document.createElement('div');
    scrollContainer.style.cssText = 'position:fixed; inset:0; z-index:10; pointer-events:none;';
    document.body.appendChild(scrollContainer);
    const scrollContent = document.createElement('div');
    scrollContent.style.height = '400vh';
    scrollContainer.appendChild(scrollContent);

    gsap.timeline({
      scrollTrigger: {
        trigger: scrollContainer,
        start: 'top top',
        end: 'bottom bottom',
        scrub: 1,
        onUpdate: (self) => {
          const progress = self.progress;
          const step = Math.floor(progress * (storySteps.length-1));
          const nextStep = Math.min(step+1, storySteps.length-1);
          const t = (progress * (storySteps.length-1)) - step;
          const s1 = storySteps[step];
          const s2 = storySteps[nextStep];
          const lat = s1.lat + (s2.lat - s1.lat) * t;
          const lon = s1.lon + (s2.lon - s1.lon) * t;
          const phi = (90 - lat) * Math.PI/180;
          const theta = (lon + 180) * Math.PI/180;
          const dist = 180;
          camera.position.set(
            dist * Math.sin(phi) * Math.cos(theta),
            dist * Math.cos(phi),
            dist * Math.sin(phi) * Math.sin(theta)
          );
          controls.target.set(0,0,0);
          controls.update();
          if (controls.autoRotate) {
            controls.autoRotate = false;
            document.getElementById('btn-auto-rotate').classList.remove('active');
          }
          // Update story card
          const currentText = s1.text + (t > 0.5 ? ' → ' + s2.text : '');
          storyCard.textContent = currentText;
          storyCard.classList.toggle('visible', true);
        },
        onLeave: () => storyCard.classList.remove('visible'),
        onEnterBack: () => storyCard.classList.add('visible')
      }
    });

    // ────────────────────────────────────────
    // TIME SLIDER
    // ────────────────────────────────────────
    const timeSlider = document.getElementById('time-slider');
    const yearLabel = document.getElementById('year-label');
    timeSlider.addEventListener('input', () => {
      currentYear = parseInt(timeSlider.value);
      yearLabel.textContent = currentYear;
      // Regenerate heatmap texture for the new year
      const newHeatTexture = generateHeatTexture(currentYear);
      uniforms.heatTexture.value = newHeatTexture;
      heatmapTexture.dispose();
      heatmapTexture = newHeatTexture;
      // Update panel chart if a country is selected
      if (selectedCountry) drawMiniChart(selectedCountry);
    });

    // ────────────────────────────────────────
    // CONTROLS
    // ────────────────────────────────────────
    document.getElementById('btn-auto-rotate').addEventListener('click', function() {
      controls.autoRotate = !controls.autoRotate;
      this.classList.toggle('active', controls.autoRotate);
    });
    document.getElementById('btn-heatmap').addEventListener('click', function() {
      heatmapEnabled = !heatmapEnabled;
      this.classList.toggle('active', heatmapEnabled);
      gsap.to(uniforms.blend, { value: heatmapEnabled ? 1.0 : 0.0, duration: 0.8, ease: 'power2.inOut' });
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      gsap.to(camera.position, { x:0, y:0, z:200, duration:1, ease:'power2.inOut' });
      gsap.to(controls.target, { x:0, y:0, z:0, duration:1, ease:'power2.inOut' });
      closePanel();
      controls.autoRotate = true;
      document.getElementById('btn-auto-rotate').classList.add('active');
    });

    // ────────────────────────────────────────
    // ANIMATION LOOP
    // ────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      stars.rotation.y += 0.0001;
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    // ────────────────────────────────────────
    // STARTUP
    // ────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    async function init() {
      await loadCountries();
      buildIdMap();
      // Update id texture
      idTexture.needsUpdate = true;
      createLabels();
      heatmapTexture = generateHeatTexture(2024);
      uniforms.heatTexture.value = heatmapTexture;
      animate();
      console.log('🌍 Super Detail Globe ready');
    }
    init();
  </script>
</body>
</html>
