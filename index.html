
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>World Explorer — Ultimate 3D Globe</title>
  <style>
    :root {
      --bg: #020617;
      --surface: rgba(15, 23, 42, 0.75);
      --accent: #22d3ee;
      --accent-purple: #8b5cf6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.1);
      --radius: 24px;
      --radius-sm: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
    }

    #globe-container {
      position: fixed;
      inset: 0;
      cursor: grab;
    }

    /* Intro overlay */
    #intro-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at center, #0f1a2e 0%, #020617 80%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; transition: opacity 0.8s, visibility 0.8s;
    }
    #intro-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
    .intro-title {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, var(--accent), var(--accent-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: introUp 1s ease-out;
    }
    .intro-sub { margin-top: 16px; color: var(--muted); font-size: 1.1rem; letter-spacing: 4px; animation: introUp 1.4s ease-out; }
    .intro-btn {
      margin-top: 36px; padding: 14px 36px; border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px); color: white; cursor: pointer;
      font-size: 18px; letter-spacing: 2px; transition: all 0.3s;
      animation: introUp 1.8s ease-out;
    }
    .intro-btn:hover { background: rgba(255,255,255,0.12); border-color: var(--accent); box-shadow: 0 0 40px rgba(34,211,238,0.4); }
    @keyframes introUp { from{opacity:0; transform:translateY(40px);} to{opacity:1; transform:translateY(0);} }

    /* Top bar */
    #top-bar {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; align-items: center; gap: 12px;
      background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border); border-radius: 50px;
      padding: 10px 18px 10px 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 20px var(--accent); }
    #search-input { background:transparent; border:none; outline:none; color:var(--text); font-size:16px; width:220px; letter-spacing:0.3px; }
    #search-input::placeholder { color:var(--muted); }
    #search-clear { background: rgba(255,255,255,0.08); border:none; color:var(--muted); width:28px; height:28px; border-radius:50%; cursor:pointer; display:none; align-items:center; justify-content:center; font-size:14px; transition:0.2s; }
    #search-clear.visible { display:flex; }
    #search-clear:hover { background: rgba(255,255,255,0.2); color:white; }
    #suggestions {
      position: absolute; top:calc(100% + 10px); left:0; right:0;
      background: rgba(15,23,42,0.9); backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
      display: none; flex-direction: column; max-height: 240px; overflow-y: auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    #suggestions.active { display:flex; }
    .suggestion-item {
      padding: 12px 20px; cursor: pointer; color: var(--muted);
      border-bottom: 1px solid rgba(255,255,255,0.04); letter-spacing:0.4px;
      display: flex; align-items: center; gap: 10px;
    }
    .suggestion-item:hover { background: rgba(255,255,255,0.08); color: white; }

    /* Tooltip */
    #tooltip {
      position: fixed; pointer-events: none; z-index: 250;
      background: rgba(15,23,42,0.9); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: 12px;
      padding: 10px 18px; color: white; font-size: 14px;
      display: none; align-items: center; gap: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      transform: translate(-50%, -120%);
    }
    #tooltip.visible { display: flex; }
    #tooltip-flag { font-size: 22px; }
    #tooltip-info { display: flex; flex-direction: column; }
    #tooltip-name { font-weight: 600; }
    #tooltip-desc { font-size: 11px; color: var(--muted); }

    /* Data panel */
    #data-panel {
      position: fixed; right: -480px; top: 50%; transform: translateY(-50%);
      width: 420px; max-width: 92vw; z-index: 150;
      background: rgba(15,23,42,0.85); backdrop-filter: blur(35px);
      border: 1px solid var(--glass-border); border-radius: var(--radius);
      padding: 30px 26px 26px;
      transition: right 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
      box-shadow: 0 30px 70px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
      display: flex; flex-direction: column; gap: 14px;
      max-height: 85vh; overflow-y: auto;
    }
    #data-panel.open { right: 30px; }
    #panel-close { position:absolute; top:16px; right:18px; background:rgba(255,255,255,0.08); border:none; color:white; width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:0.2s; }
    #panel-close:hover { background:rgba(255,255,255,0.2); }
    #panel-flag { font-size: 56px; animation: flagPop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes flagPop { 0%{transform:scale(0); opacity:0;} 60%{transform:scale(1.2);} 100%{transform:scale(1); opacity:1;} }
    #panel-name { font-size:28px; font-weight:800; background:linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .panel-mode-switch { display:flex; gap:8px; margin:4px 0 8px; }
    .mode-btn {
      background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
      color: var(--muted); padding:6px 16px; border-radius:24px; font-size:12px;
      cursor:pointer; transition:0.3s; letter-spacing:0.5px;
    }
    .mode-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
    .stat-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.04);
      transition: background 0.2s;
    }
    .stat-row:hover { background: rgba(255,255,255,0.02); border-radius: 4px; }
    .stat-label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:1px; font-weight:500; }
    .stat-value { font-weight:600; font-size:15px; }

    #mini-chart { width:100%; height:70px; margin-top:12px; border-radius:12px; background:rgba(255,255,255,0.02); }

    /* Heatmap legend */
    #heatmap-legend {
      position: fixed; bottom: 100px; right: 30px; z-index: 190;
      display: none; align-items: center; gap: 8px;
      background: rgba(15,23,42,0.8); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
      padding: 8px 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      font-size: 11px;
    }
    #heatmap-legend.visible { display: flex; }
    .legend-gradient {
      width: 80px; height: 8px; border-radius: 4px;
      background: linear-gradient(to right, #001878, #2db4b4, #f0c830, #f0641e, #dc2832);
    }

    /* Story card */
    #story-card {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(15,23,42,0.9); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
      padding: 16px 28px; z-index: 180;
      opacity: 0; transition: opacity 0.5s;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      font-size: 20px; font-weight: 600; letter-spacing: 0.5px;
    }
    #story-card.visible { opacity: 1; }

    /* Controls */
    #controls {
      position: fixed; bottom: 30px; right: 30px; z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
    }
    .ctrl-btn {
      width:44px; height:44px; border-radius:50%;
      background: rgba(15,23,42,0.8); backdrop-filter: blur(20px);
      border:1px solid var(--glass-border); color:white; cursor:pointer;
      font-size:19px; display:flex; align-items:center; justify-content:center;
      transition: all 0.25s; box-shadow:0 8px 24px rgba(0,0,0,0.5);
    }
    .ctrl-btn:hover { border-color:var(--accent); box-shadow:0 0 28px var(--accent); transform:translateY(-2px); }
    .ctrl-btn.active { border-color:var(--accent-purple); background:rgba(139,92,246,0.2); }

    /* Time slider */
    #time-slider-container {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 200; display: flex; align-items: center; gap: 14px;
      background: rgba(15,23,42,0.8); backdrop-filter: blur(20px);
      border:1px solid var(--glass-border); border-radius:50px;
      padding:10px 24px; box-shadow:0 8px 30px rgba(0,0,0,0.5);
    }
    #year-label { font-size:15px; min-width:40px; text-align:center; font-weight:600; }
    input[type=range] { width:140px; accent-color:var(--accent); }

    /* Ripple effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: rippleOut 0.8s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleOut {
      from { width:10px; height:10px; opacity:1; transform:translate(-50%,-50%) scale(0); }
      to { width:60px; height:60px; opacity:0; transform:translate(-50%,-50%) scale(1); }
    }

    @media (max-width: 768px) {
      #data-panel { width: calc(100vw - 20px); right:-105vw; bottom:20px; top:auto; transform:none; border-radius: var(--radius) var(--radius) 8px 8px; }
      #data-panel.open { right:10px; }
      #time-slider-container { bottom: 90px; }
    }
  </style>
</head>
<body>
  <div id="intro-overlay">
    <div class="intro-title">World Explorer</div>
    <div class="intro-sub">INTERACTIVE 3D GLOBE</div>
    <button class="intro-btn" id="start-exploring">EXPLORE EARTH</button>
  </div>

  <div id="globe-container"></div>

  <div id="tooltip"><span id="tooltip-flag"></span><div id="tooltip-info"><span id="tooltip-name"></span><span id="tooltip-desc"></span></div></div>

  <div id="top-bar">
    <div class="dot"></div>
    <input type="text" id="search-input" placeholder="Search any country..." autocomplete="off">
    <button id="search-clear">✕</button>
    <div id="suggestions"></div>
  </div>

  <div id="data-panel">
    <button id="panel-close">✕</button>
    <div id="panel-flag">🌍</div>
    <div id="panel-name">Select a Country</div>
    <div class="panel-mode-switch">
      <button class="mode-btn active" data-mode="population">Population</button>
      <button class="mode-btn" data-mode="density">Density</button>
      <button class="mode-btn" data-mode="gdp">GDP</button>
    </div>
    <div class="stat-row"><span class="stat-label">Population</span><span class="stat-value" id="stat-pop">—</span></div>
    <div class="stat-row"><span class="stat-label">Capital</span><span class="stat-value" id="stat-cap">—</span></div>
    <div class="stat-row"><span class="stat-label">Region</span><span class="stat-value" id="stat-region">—</span></div>
    <div class="stat-row"><span class="stat-label">Area</span><span class="stat-value" id="stat-area">—</span></div>
    <div class="stat-row"><span class="stat-label">Languages</span><span class="stat-value" id="stat-lang">—</span></div>
    <div class="stat-row"><span class="stat-label">Currencies</span><span class="stat-value" id="stat-curr">—</span></div>
    <canvas id="mini-chart" width="320" height="70"></canvas>
  </div>

  <div id="heatmap-legend"><span>Low</span><div class="legend-gradient"></div><span>High</span></div>

  <div id="story-card"></div>

  <div id="controls">
    <button class="ctrl-btn active" id="btn-auto-rotate">⟳</button>
    <button class="ctrl-btn" id="btn-heatmap">🔥</button>
    <button class="ctrl-btn" id="btn-reset">⌂</button>
  </div>

  <div id="time-slider-container">
    <span>⏳</span>
    <input type="range" id="time-slider" min="1960" max="2024" value="2024" step="1">
    <span id="year-label">2024</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
    gsap.registerPlugin(ScrollTrigger);

    // DATA
    const countries = [];
    let countryDataMap = {};
    let maxPopulation = 1;
    let selectedCountry = null, hoveredCountryId = 0;
    let currentYear = 2024, activeMode = 'population', heatmapOn = false;
    let heatmapTexture;

    async function loadCountries() {
      try {
        const res = await fetch('https://restcountries.com/v3.1/all');
        const data = await res.json();
        data.forEach(c => {
          if (!c.latlng || c.latlng.length !== 2) return;
          const iso = c.cca3, name = c.name.common, flag = c.flag;
          const pop = c.population || 0, cap = c.capital?.[0] || '', reg = c.region || '', area = c.area || 0;
          const lang = c.languages ? Object.values(c.languages).join(', ') : '';
          const curr = c.currencies ? Object.keys(c.currencies).map(k => c.currencies[k].name).join(', ') : '';
          const lat = c.latlng[0], lon = c.latlng[1];
          const den = area ? pop/area : 0, gdp = c.gdp || 0;
          countries.push({ iso, name, lat, lon, flag, pop, cap, reg, area, lang, curr, den, gdp });
          countryDataMap[iso] = { name, flag, pop, cap, reg, area, lang, curr, den, gdp };
        });
        maxPopulation = Math.max(...countries.map(c => c.pop), 1);
      } catch(e) { insertFallback(); }
    }
    function insertFallback() {
      const fb = [
        { iso:'US', name:'United States', lat:38, lon:-97, flag:'🇺🇸', pop:334914895, cap:'Washington D.C.', reg:'Americas', area:9833520, lang:'English', curr:'US Dollar', den:34, gdp:26.95e12 },
        { iso:'CN', name:'China', lat:35, lon:105, flag:'🇨🇳', pop:1425671352, cap:'Beijing', reg:'Asia', area:9596961, lang:'Chinese', curr:'Renminbi', den:148, gdp:17.96e12 },
        { iso:'IN', name:'India', lat:20, lon:78, flag:'🇮🇳', pop:1428627663, cap:'New Delhi', reg:'Asia', area:3287263, lang:'Hindi, English', curr:'Indian Rupee', den:434, gdp:3.55e12 }
      ];
      fb.forEach(c => { countries.push(c); countryDataMap[c.iso] = c; });
      maxPopulation = Math.max(...countries.map(c => c.pop), 1);
    }

    // ID MAP
    const idCanvas = document.createElement('canvas');
    idCanvas.width=1024; idCanvas.height=512;
    const ctx = idCanvas.getContext('2d');
    function latLonToPixel(lat, lon) { return [(lon+180)*(1024/360), (90-lat)*(512/180)]; }
    function buildIdMap() {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,1024,512);
      countries.forEach((c,idx)=>{
        const id=idx+1, r=(id>>16)&0xff, g=(id>>8)&0xff, b=id&0xff;
        ctx.fillStyle=`rgb(${r},${g},${b})`;
        const [x,y]=latLonToPixel(c.lat,c.lon);
        const rad=Math.max(5, Math.sqrt(c.area||50000)*0.01);
        ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
      });
    }

    // THREE
    const container = document.getElementById('globe-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020617);
    const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0,0,200);
    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(2,devicePixelRatio));
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth,innerHeight);
    labelRenderer.domElement.style.position='absolute'; labelRenderer.domElement.style.top='0'; labelRenderer.domElement.style.pointerEvents='none';
    container.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping=true; controls.dampingFactor=0.08;
    controls.rotateSpeed=0.5; controls.zoomSpeed=1.2; controls.minDistance=60; controls.maxDistance=350;
    controls.autoRotate=true; controls.autoRotateSpeed=0.6;

    // TEXTURES
    const texLoader = new THREE.TextureLoader();
    const baseTex = texLoader.load('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg');
    const idTexture = new THREE.CanvasTexture(idCanvas);
    const heatCanvas = document.createElement('canvas'); heatCanvas.width=1024; heatCanvas.height=512;
    const hctx = heatCanvas.getContext('2d');
    function genHeatTexture(year, mode='population') {
      hctx.clearRect(0,0,1024,512);
      let maxVal = mode==='population'? maxPopulation : (mode==='density'? Math.max(...countries.map(c=>c.den||0),1) : Math.max(...countries.map(c=>c.gdp||0),1));
      countries.forEach(c => {
        let val;
        const growth = 0.005 + (c.name?.charCodeAt(0)%10)*0.002;
        if(mode==='population') val = c.pop * Math.exp(growth*(year-2024));
        else if(mode==='density') val = (c.den||0) * Math.exp(growth*0.7*(year-2024));
        else val = (c.gdp||c.pop*1000) * Math.exp(growth*1.2*(year-2024));
        const ratio = Math.min(1, Math.max(0, val/maxVal));
        const r=Math.floor(255*ratio), g=Math.floor(120*(1-ratio)), b=Math.floor(200*(1-ratio));
        hctx.fillStyle = `rgb(${r},${g},${b})`;
        const [x,y] = latLonToPixel(c.lat, c.lon);
        const rad = Math.max(4, Math.sqrt(c.area||100000)*0.008);
        hctx.beginPath(); hctx.arc(x,y,rad,0,Math.PI*2); hctx.fill();
      });
      return new THREE.CanvasTexture(heatCanvas);
    }
    heatmapTexture = genHeatTexture(2024);

    // GLOBE SHADER
    const earthGroup = new THREE.Group();
    const vert = `varying vec2 vUv; varying vec3 vNormal; void main(){ vUv=uv; vNormal=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`;
    const frag = `
      uniform sampler2D baseTexture, heatTexture, idTexture;
      uniform float blend;
      uniform int hoverId;
      varying vec2 vUv; varying vec3 vNormal;
      void main(){
        vec4 base = texture2D(baseTexture, vUv);
        vec4 heat = texture2D(heatTexture, vUv);
        vec4 col = mix(base, heat, blend);
        if(hoverId>0){
          vec4 idc = texture2D(idTexture, vUv);
          int id = int(idc.r*255.0)*65536 + int(idc.g*255.0)*256 + int(idc.b*255.0);
          if(id==hoverId) col.rgb = mix(col.rgb, vec3(0.3,0.9,1.0), 0.7);
        }
        float light = 0.3 + 0.7*max(0.0, dot(vNormal, vec3(0.5,0.8,0.3)));
        gl_FragColor = vec4(col.rgb*light, 1.0);
      }
    `;
    const uniforms = { baseTexture:{value:baseTex}, heatTexture:{value:heatmapTexture}, idTexture:{value:idTexture}, blend:{value:0.0}, hoverId:{value:0} };
    const earthMat = new THREE.ShaderMaterial({uniforms, vertexShader:vert, fragmentShader:frag, side:THREE.FrontSide});
    const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(50,128,128), earthMat);
    earthGroup.add(earthMesh);

    const glowGeo = new THREE.SphereGeometry(51,64,64);
    const glowMat = new THREE.ShaderMaterial({
      vertexShader:`varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader:`varying vec3 vN; void main(){ float i=pow(0.75-dot(vN,vec3(0,0,1)),2.5); gl_FragColor=vec4(0.13,0.83,0.93,1.0)*i; }`,
      blending:THREE.AdditiveBlending, side:THREE.FrontSide, transparent:true, depthWrite:false
    });
    earthGroup.add(new THREE.Mesh(glowGeo, glowMat));
    const idMesh = new THREE.Mesh(new THREE.SphereGeometry(50.2,128,128), new THREE.MeshBasicMaterial({map:idTexture, transparent:true, opacity:0, side:THREE.FrontSide}));
    earthGroup.add(idMesh);
    scene.add(earthGroup);

    scene.add(new THREE.AmbientLight(0x404066));
    const dir = new THREE.DirectionalLight(0xffffff,1.2); dir.position.set(1,1,1); scene.add(dir);

    const starsGeo = new THREE.BufferGeometry(); const starsPos = new Float32Array(2000*3);
    for(let i=0;i<2000*3;i+=3){ starsPos[i]=(Math.random()-0.5)*1000; starsPos[i+1]=(Math.random()-0.5)*600; starsPos[i+2]=(Math.random()-0.5)*800; }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos,3));
    const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff, size:0.5}));
    scene.add(stars);

    const particlesGeo = new THREE.BufferGeometry(); const partPos = new Float32Array(400*3);
    for(let i=0;i<400*3;i+=3){ const th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI, r=53+Math.random()*8; partPos[i]=r*Math.sin(ph)*Math.cos(th); partPos[i+1]=r*Math.cos(ph); partPos[i+2]=r*Math.sin(ph)*Math.sin(th); }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(partPos,3));
    const particles = new THREE.Points(particlesGeo, new THREE.PointsMaterial({color:0x22d3ee, size:0.2, blending:THREE.AdditiveBlending}));
    earthGroup.add(particles);

    // LABELS (only show when camera is close)
    const labelsGroup = new THREE.Group(); earthGroup.add(labelsGroup);
    const labelDivs = [];
    function createLabels() {
      while(labelsGroup.children.length) labelsGroup.remove(labelsGroup.children[0]);
      labelDivs.length = 0;
      countries.forEach(c => {
        const div = document.createElement('div');
        div.textContent = c.name;
        div.style.cssText = 'color:white; font-size:10px; font-weight:500; text-shadow:0 0 8px black; background:rgba(0,0,0,0.6); padding:2px 8px; border-radius:12px; opacity:0; transition: opacity 0.3s;';
        const label = new CSS2DObject(div);
        const phi=(90-c.lat)*Math.PI/180, theta=(c.lon+180)*Math.PI/180;
        label.position.set(52*Math.sin(phi)*Math.cos(theta), 52*Math.cos(phi), 52*Math.sin(phi)*Math.sin(theta));
        labelsGroup.add(label);
        labelDivs.push({ label, country:c });
      });
    }
    // Update label visibility based on distance
    setInterval(() => {
      const dist = camera.position.length();
      labelDivs.forEach(item => {
        item.label.element.style.opacity = dist < 130 ? '1' : '0';
      });
    }, 200);

    // RAYCAST
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    const tooltip = document.getElementById('tooltip');
    function getCountryIdFromUV(uv) {
      const x = Math.floor(uv.x*1024), y = Math.floor((1-uv.y)*512);
      const pix = ctx.getImageData(x,y,1,1).data;
      return (pix[0]<<16)|(pix[1]<<8)|pix[2];
    }
    function onMouseMove(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX-rect.left)/rect.width)*2-1; mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(idMesh);
      if(hits.length>0){
        const id = getCountryIdFromUV(hits[0].uv);
        if(id!==hoveredCountryId){
          hoveredCountryId=id; uniforms.hoverId.value=id;
          if(id>0 && id<=countries.length){
            const c = countries[id-1];
            document.getElementById('tooltip-flag').textContent=c.flag||'';
            document.getElementById('tooltip-name').textContent=c.name;
            document.getElementById('tooltip-desc').textContent=`${c.cap||''} · ${c.reg||''}`;
            tooltip.classList.add('visible'); container.style.cursor='pointer';
          } else { tooltip.classList.remove('visible'); container.style.cursor='grab'; }
        }
        if(hoveredCountryId>0){ tooltip.style.left=(e.clientX+15)+'px'; tooltip.style.top=(e.clientY-30)+'px'; }
      } else { if(hoveredCountryId!==0){ hoveredCountryId=0; uniforms.hoverId.value=0; tooltip.classList.remove('visible'); container.style.cursor='grab'; } }
    }
    function onClick(e) {
      if(hoveredCountryId>0 && hoveredCountryId<=countries.length) {
        flyToCountry(countries[hoveredCountryId-1]);
        // Ripple effect
        const rect = renderer.domElement.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = x + 'px'; ripple.style.top = y + 'px';
        container.appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
      }
    }
    renderer.domElement.addEventListener('mousemove', onMouseMove);
    renderer.domElement.addEventListener('click', onClick);

    // FLY TO
    let markerObj = null;
    function flyToCountry(country) {
      controls.autoRotate=false; document.getElementById('btn-auto-rotate').classList.remove('active');
      const lat=country.lat*Math.PI/180, lon=country.lon*Math.PI/180;
      const pos = new THREE.Vector3(130*Math.cos(lat)*Math.cos(lon), 130*Math.sin(lat), 130*Math.cos(lat)*Math.sin(lon));
      gsap.to(camera.position, { x:pos.x, y:pos.y, z:pos.z, duration:1.4, ease:'power3.inOut', onUpdate:()=>controls.update() });
      gsap.to(controls.target, { x:0,y:0,z:0, duration:1.4, ease:'power3.inOut' });
      openPanel(country);
      // Marker
      if(markerObj) earthGroup.remove(markerObj);
      const phi=(90-country.lat)*Math.PI/180, theta=(country.lon+180)*Math.PI/180;
      const markerPos = new THREE.Vector3(51*Math.sin(phi)*Math.cos(theta), 51*Math.cos(phi), 51*Math.sin(phi)*Math.sin(theta));
      const markerDiv = document.createElement('div');
      markerDiv.className = 'marker-label'; markerDiv.textContent = '📍';
      markerObj = new CSS2DObject(markerDiv); markerObj.position.copy(markerPos);
      earthGroup.add(markerObj);
    }

    // PANEL
    const panel = document.getElementById('data-panel');
    function openPanel(c) {
      selectedCountry=c; const d=countryDataMap[c.iso]||{};
      document.getElementById('panel-flag').textContent=d.flag||'';
      document.getElementById('panel-name').textContent=d.name;
      document.getElementById('stat-pop').textContent=d.pop?.toLocaleString()||'—';
      document.getElementById('stat-cap').textContent=d.cap||'—';
      document.getElementById('stat-region').textContent=d.reg||'—';
      document.getElementById('stat-area').textContent=d.area?d.area.toLocaleString()+' km²':'—';
      document.getElementById('stat-lang').textContent=d.lang||'—';
      document.getElementById('stat-curr').textContent=d.curr||'—';
      drawChart(c);
      panel.classList.add('open');
    }
    function closePanel() { panel.classList.remove('open'); selectedCountry=null; if(markerObj){ earthGroup.remove(markerObj); markerObj=null; } }
    function drawChart(country) {
      const w=320, h=70, chartCtx=document.getElementById('mini-chart').getContext('2d');
      chartCtx.clearRect(0,0,w,h);
      const pts=[];
      for(let y=1960;y<=2024;y+=5){
        const grow=0.005+(country.name?.charCodeAt(0)%10)*0.002;
        let val;
        if(activeMode==='population') val=country.pop*Math.exp(grow*(y-2024));
        else if(activeMode==='density') val=(country.den||0)*Math.exp(grow*0.7*(y-2024));
        else val=(country.gdp||country.pop*1000)*Math.exp(grow*1.2*(y-2024));
        pts.push({y,val});
      }
      const max=Math.max(...pts.map(p=>p.val));
      chartCtx.beginPath(); chartCtx.strokeStyle='#22d3ee'; chartCtx.lineWidth=2;
      pts.forEach((p,i)=>{ const x=(i/(pts.length-1))*w; const yy=h-(p.val/max)*h; if(i===0) chartCtx.moveTo(x,yy); else chartCtx.lineTo(x,yy); });
      chartCtx.stroke();
    }
    document.getElementById('panel-close').addEventListener('click', closePanel);
    document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>{
      document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active');
      activeMode=b.dataset.mode; heatmapTexture=genHeatTexture(currentYear,activeMode); uniforms.heatTexture.value=heatmapTexture;
      if(selectedCountry) drawChart(selectedCountry);
    }));

    // SEARCH
    const searchInput=document.getElementById('search-input'), searchClear=document.getElementById('search-clear'), suggestions=document.getElementById('suggestions');
    searchInput.addEventListener('input',()=>{
      const q=searchInput.value.trim().toLowerCase(); suggestions.innerHTML='';
      if(q){ searchClear.classList.add('visible'); const matches=countries.filter(c=>c.name.toLowerCase().includes(q));
        matches.forEach(c=>{ const div=document.createElement('div'); div.className='suggestion-item'; div.innerHTML=`<span>${c.flag||''}</span> ${c.name}`;
          div.addEventListener('click',()=>{ flyToCountry(c); searchInput.value=''; suggestions.classList.remove('active'); searchClear.classList.remove('visible'); });
          suggestions.appendChild(div);
        }); suggestions.classList.add('active');
      } else { searchClear.classList.remove('visible'); suggestions.classList.remove('active'); }
    });
    searchClear.addEventListener('click',()=>{ searchInput.value=''; searchClear.classList.remove('visible'); suggestions.classList.remove('active'); });

    // STORY SCROLL
    const scrollContainer=document.createElement('div'); scrollContainer.style.cssText='position:fixed; inset:0; z-index:10; pointer-events:none;'; document.body.appendChild(scrollContainer);
    const scrollContent=document.createElement('div'); scrollContent.style.height='400vh'; scrollContainer.appendChild(scrollContent);
    gsap.timeline({scrollTrigger:{trigger:scrollContainer, start:'top top', end:'bottom bottom', scrub:1,
      onUpdate:(self)=>{
        const steps=[{lat:30,lon:-100,txt:'North America'},{lat:-10,lon:-60,txt:'South America'},{lat:50,lon:10,txt:'Europe'},{lat:30,lon:80,txt:'Asia'},{lat:-25,lon:135,txt:'Oceania'},{lat:5,lon:20,txt:'Africa'}];
        const step=Math.floor(self.progress*(steps.length-1)), next=Math.min(step+1,steps.length-1), t=(self.progress*(steps.length-1))-step;
        const s1=steps[step], s2=steps[next];
        const lat=s1.lat+(s2.lat-s1.lat)*t, lon=s1.lon+(s2.lon-s1.lon)*t;
        const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180, dist=180;
        camera.position.set(dist*Math.sin(phi)*Math.cos(theta), dist*Math.cos(phi), dist*Math.sin(phi)*Math.sin(theta));
        controls.target.set(0,0,0); controls.update();
        document.getElementById('story-card').textContent=s1.txt+(t>0.5?' → '+s2.txt:''); document.getElementById('story-card').classList.add('visible');
      },
      onLeave:()=>document.getElementById('story-card').classList.remove('visible'),
      onEnterBack:()=>document.getElementById('story-card').classList.add('visible')
    }});

    // TIME
    document.getElementById('time-slider').addEventListener('input',function(){
      currentYear=parseInt(this.value); document.getElementById('year-label').textContent=currentYear;
      heatmapTexture=genHeatTexture(currentYear,activeMode); uniforms.heatTexture.value=heatmapTexture;
      if(selectedCountry) drawChart(selectedCountry);
    });

    // CONTROLS
    const btnAuto = document.getElementById('btn-auto-rotate');
    btnAuto.addEventListener('click',()=>{ controls.autoRotate=!controls.autoRotate; btnAuto.classList.toggle('active',controls.autoRotate); });
    const btnHeat = document.getElementById('btn-heatmap');
    btnHeat.addEventListener('click',()=>{
      heatmapOn=!heatmapOn; btnHeat.classList.toggle('active',heatmapOn);
      gsap.to(uniforms.blend, {value:heatmapOn?1:0, duration:0.8, ease:'power2.inOut'});
      document.getElementById('heatmap-legend').classList.toggle('visible', heatmapOn);
    });
    document.getElementById('btn-reset').addEventListener('click',()=>{
      gsap.to(camera.position,{x:0,y:0,z:200,duration:1.2,ease:'power3.out'}); gsap.to(controls.target,{x:0,y:0,z:0,duration:1.2,ease:'power3.out'});
      closePanel(); controls.autoRotate=true; btnAuto.classList.add('active');
    });

    // ANIMATION
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      stars.rotation.y += 0.0001;
      particles.rotation.y += 0.0002;
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    // START
    window.addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight); labelRenderer.setSize(innerWidth,innerHeight);
    });
    document.getElementById('start-exploring').addEventListener('click',()=>{
      gsap.to('#intro-overlay',{opacity:0, duration:0.8, onComplete:()=>document.getElementById('intro-overlay').classList.add('hidden')});
      gsap.from('#top-bar',{y:-60, opacity:0, duration:0.8, delay:0.3});
      gsap.from('#controls',{opacity:0, x:40, duration:0.6, delay:0.5});
      gsap.from('#time-slider-container',{opacity:0, y:30, duration:0.6, delay:0.6});
    });

    async function init() {
      await loadCountries(); buildIdMap(); idTexture.needsUpdate=true; createLabels();
      heatmapTexture=genHeatTexture(2024); uniforms.heatTexture.value=heatmapTexture;
      animate();
    }
    init();
    console.log('🌍 Ultimate Globe ready');
  </script>
</body>
</html>
