<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>World Explorer — Next Level 3D Globe</title>
  <style>
    :root {
      --bg: #020617;
      --surface: rgba(15,23,42,0.8);
      --accent: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Scroll container for storytelling */
    #scroll-container {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none; /* let clicks pass to canvas */
    }
    #scroll-content {
      height: 400vh; /* enough for story steps */
      width: 100%;
    }

    #globe-container {
      position: fixed;
      inset: 0;
      z-index: 5;
      cursor: grab;
    }
    #globe-container:active { cursor: grabbing; }

    /* Overlay UI */
    #ui-overlay {
      position: fixed;
      z-index: 100;
      pointer-events: none;
      inset: 0;
    }

    #top-bar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 8px 10px 8px 22px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px rgba(34,211,238,0.5);
    }
    #search-input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 15px; width: 200px;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-clear {
      background: rgba(255,255,255,0.06); border: none; color: var(--muted);
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      display: none; align-items: center; justify-content: center; font-size: 14px;
    }
    #search-clear.visible { display: flex; }
    #suggestions {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: var(--surface); backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      display: none; flex-direction: column; max-height: 240px; overflow-y: auto;
    }
    #suggestions.active { display: flex; }
    .suggestion-item {
      padding: 10px 18px; cursor: pointer; color: var(--muted);
      transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .suggestion-item:hover { background: rgba(255,255,255,0.06); color: #fff; }

    #data-panel {
      position: absolute;
      right: -440px; top: 50%; transform: translateY(-50%);
      width: 380px; max-width: 90vw;
      background: var(--surface); backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius);
      padding: 28px 26px 24px;
      transition: right 0.55s cubic-bezier(0.25,0.46,0.45,0.94);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      pointer-events: auto;
    }
    #data-panel.open { right: 28px; }
    #panel-close {
      position: absolute; top: 14px; right: 16px;
      background: rgba(255,255,255,0.06); border: none; color: #fff;
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    #panel-flag { font-size: 48px; }
    #panel-name {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .panel-stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .panel-stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }
    .panel-stat-value { font-weight: 600; }

    #controls {
      position: absolute;
      bottom: 28px; right: 28px;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: auto;
    }
    .ctrl-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--surface); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08); color: #fff; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: 0.2s; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .ctrl-btn:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }
    .ctrl-btn.active { border-color: #8b5cf6; background: rgba(139,92,246,0.2); }

    @media (max-width: 768px) {
      #data-panel { width: calc(100vw - 20px); right: -110vw; bottom: 16px; top: auto; transform: none; }
      #data-panel.open { right: 10px; }
    }
  </style>
</head>
<body>
  <div id="globe-container"></div>

  <!-- Scroll story layer (invisible) -->
  <div id="scroll-container">
    <div id="scroll-content"></div>
  </div>

  <!-- UI -->
  <div id="ui-overlay">
    <div id="top-bar">
      <div class="dot"></div>
      <input type="text" id="search-input" placeholder="Search country..." autocomplete="off">
      <button id="search-clear">✕</button>
      <div id="suggestions"></div>
    </div>
    <div id="data-panel">
      <button id="panel-close">✕</button>
      <div id="panel-flag">🌍</div>
      <div id="panel-name">Select a Country</div>
      <div class="panel-stat"><span class="panel-stat-label">Population</span><span class="panel-stat-value" id="stat-pop">—</span></div>
      <div class="panel-stat"><span class="panel-stat-label">Capital</span><span class="panel-stat-value" id="stat-capital">—</span></div>
      <div class="panel-stat"><span class="panel-stat-label">Region</span><span class="panel-stat-value" id="stat-region">—</span></div>
      <div class="panel-stat"><span class="panel-stat-label">Area</span><span class="panel-stat-value" id="stat-area">—</span></div>
    </div>
    <div id="controls">
      <button class="ctrl-btn active" id="btn-auto-rotate" title="Auto-rotate">⟳</button>
      <button class="ctrl-btn" id="btn-heatmap" title="Heatmap">🔥</button>
      <button class="ctrl-btn" id="btn-reset" title="Reset">⌂</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ────────────────────────────────────────
    // GLOBAL STATE & API DATA
    // ────────────────────────────────────────
    const countries = [];
    let countryDataMap = {};   // iso -> api data
    let selectedCountry = null;
    let heatmapEnabled = false;
    let heatmapBlend = { value: 0 }; // shader uniform

    // ────────────────────────────────────────
    // FETCH ALL COUNTRIES & BUILD LIST
    // ────────────────────────────────────────
    async function loadCountries() {
      try {
        const res = await fetch('https://restcountries.com/v3.1/all');
        const data = await res.json();
        data.forEach(c => {
          if (c.latlng && c.latlng.length === 2) {
            const lat = c.latlng[0];
            const lon = c.latlng[1];
            const iso = c.cca3;
            const name = c.name.common;
            const flag = c.flag;
            const population = c.population;
            const capital = c.capital?.[0] || '';
            const region = c.region;
            const area = c.area || 0;
            countries.push({ iso, name, lat, lon, flag, population, capital, region, area });
            countryDataMap[iso] = { name, flag, population, capital, region, area };
          }
        });
        console.log(`Loaded ${countries.length} countries`);
        buildIdMap();
        createLabels();
      } catch (e) {
        console.warn('API failed, using fallback', e);
        insertFallbackCountries();
        buildIdMap();
        createLabels();
      }
    }

    function insertFallbackCountries() {
      // minimal fallback list
      const fallback = [
        { iso:'US', name:'United States', lat:38, lon:-97, flag:'🇺🇸', population:334914895, capital:'Washington D.C.', region:'Americas', area:9833520 },
        { iso:'CN', name:'China', lat:35, lon:105, flag:'🇨🇳', population:1425671352, capital:'Beijing', region:'Asia', area:9596961 },
        { iso:'IN', name:'India', lat:20, lon:78, flag:'🇮🇳', population:1428627663, capital:'New Delhi', region:'Asia', area:3287263 },
        { iso:'BR', name:'Brazil', lat:-10, lon:-55, flag:'🇧🇷', population:216422446, capital:'Brasília', region:'Americas', area:8515767 },
        { iso:'GB', name:'United Kingdom', lat:54, lon:-2, flag:'🇬🇧', population:67508936, capital:'London', region:'Europe', area:243610 },
        { iso:'FR', name:'France', lat:46, lon:2, flag:'🇫🇷', population:64756584, capital:'Paris', region:'Europe', area:643801 },
        { iso:'DE', name:'Germany', lat:51, lon:9, flag:'🇩🇪', population:83294633, capital:'Berlin', region:'Europe', area:357114 },
        { iso:'JP', name:'Japan', lat:36, lon:138, flag:'🇯🇵', population:123294513, capital:'Tokyo', region:'Asia', area:377975 },
        { iso:'AU', name:'Australia', lat:-25, lon:135, flag:'🇦🇺', population:26439111, capital:'Canberra', region:'Oceania', area:7692024 },
        { iso:'ZA', name:'South Africa', lat:-29, lon:24, flag:'🇿🇦', population:60414495, capital:'Pretoria', region:'Africa', area:1221037 }
      ];
      fallback.forEach(c => {
        countries.push(c);
        countryDataMap[c.iso] = { name:c.name, flag:c.flag, population:c.population, capital:c.capital, region:c.region, area:c.area };
      });
    }

    // ────────────────────────────────────────
    // ID-MAP CANVAS (512x256)
    // ────────────────────────────────────────
    const idMapCanvas = document.createElement('canvas');
    idMapCanvas.width = 512;
    idMapCanvas.height = 256;
    const ctx = idMapCanvas.getContext('2d');
    function latLonToXY(lat, lon) {
      const x = (lon + 180) * (512 / 360);
      const y = (90 - lat) * (256 / 180);
      return [x, y];
    }
    function buildIdMap() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0,0,512,256);
      countries.forEach((c, idx) => {
        const id = idx + 1;
        const r = (id >> 16) & 0xff;
        const g = (id >> 8) & 0xff;
        const b = id & 0xff;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        // draw a small rectangle around lat/lon (simplified)
        const [x, y] = latLonToXY(c.lat, c.lon);
        const size = 6;
        ctx.fillRect(x - size/2, y - size/2, size, size);
        // also add a larger coverage for bigger countries (approx)
        if (c.area > 5e6) { // Russia, China, etc.
          const bigSize = 20;
          ctx.fillRect(x - bigSize/2, y - bigSize/2, bigSize, bigSize);
        }
      });
    }

    // ────────────────────────────────────────
    // THREE.JS SETUP
    // ────────────────────────────────────────
    const container = document.getElementById('globe-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020617);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,0,200);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.5;
    controls.zoomSpeed = 1.2;
    controls.minDistance = 60;
    controls.maxDistance = 350;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;

    // ────────────────────────────────────────
    // GLOBE with CUSTOM SHADER for heatmap blending
    // ────────────────────────────────────────
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // Load textures
    const textureLoader = new THREE.TextureLoader();
    const baseTexture = textureLoader.load('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/2560px-Blue_Marble_2002.png');
    const heatTextureCanvas = document.createElement('canvas');
    heatTextureCanvas.width = 1024;
    heatTextureCanvas.height = 512;
    const hctx = heatTextureCanvas.getContext('2d');
    function generateHeatTexture() {
      const maxPop = Math.max(...countries.map(c => c.population || 1), 1);
      hctx.clearRect(0,0,1024,512);
      countries.forEach(c => {
        const pop = c.population || 1e6;
        const ratio = Math.min(pop / maxPop, 1);
        const r = Math.floor(255 * ratio);
        const g = Math.floor(120 * (1 - ratio));
        const b = Math.floor(180 * (1 - ratio));
        hctx.fillStyle = `rgb(${r},${g},${b})`;
        const [x, y] = latLonToXY(c.lat, c.lon);
        const size = 14;
        hctx.fillRect(x*2 - size/2, y*2 - size/2, size, size);
      });
      return new THREE.CanvasTexture(heatTextureCanvas);
    }
    let heatTexture = generateHeatTexture();

    // Shader material
    const vertexShader = `
      varying vec2 vUv;
      varying vec3 vNormal;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    const fragmentShader = `
      uniform sampler2D baseTexture;
      uniform sampler2D heatTexture;
      uniform float blend;
      varying vec2 vUv;
      varying vec3 vNormal;
      void main() {
        vec4 baseColor = texture2D(baseTexture, vUv);
        vec4 heatColor = texture2D(heatTexture, vUv);
        vec4 color = mix(baseColor, heatColor, blend);
        float light = 0.3 + 0.7 * max(0.0, dot(vNormal, vec3(0.5,0.8,0.3)));
        gl_FragColor = vec4(color.rgb * light, 1.0);
      }
    `;
    const uniforms = {
      baseTexture: { value: baseTexture },
      heatTexture: { value: heatTexture },
      blend: { value: 0.0 }
    };
    const earthMat = new THREE.ShaderMaterial({
      uniforms,
      vertexShader,
      fragmentShader,
      side: THREE.FrontSide
    });
    const geometry = new THREE.SphereGeometry(50, 128, 128);
    const earthMesh = new THREE.Mesh(geometry, earthMat);
    earthGroup.add(earthMesh);

    // ID mesh for raycasting
    const idTexture = new THREE.CanvasTexture(idMapCanvas);
    const idMat = new THREE.MeshBasicMaterial({ map: idTexture, transparent: true, opacity: 0.0, side: THREE.FrontSide });
    const idMesh = new THREE.Mesh(new THREE.SphereGeometry(50.2, 128, 128), idMat);
    earthGroup.add(idMesh);

    // Atmosphere glow
    const glowGeo = new THREE.SphereGeometry(51, 64, 64);
    const glowMat = new THREE.ShaderMaterial({
      uniforms: {},
      vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `varying vec3 vNormal; void main() { float intensity = pow(0.75 - dot(vNormal, vec3(0,0,1)), 2.5); gl_FragColor = vec4(0.13,0.83,0.93,1.0) * intensity; }`,
      blending: THREE.AdditiveBlending,
      side: THREE.FrontSide,
      transparent: true,
      depthWrite: false
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    earthGroup.add(glowMesh);

    // Lighting
    scene.add(new THREE.AmbientLight(0x404066));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(1,1,1);
    scene.add(dirLight);

    // Stars
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = new Float32Array(2000*3);
    for (let i=0;i<2000*3;i+=3) { starsPos[i] = (Math.random()-0.5)*1000; starsPos[i+1] = (Math.random()-0.5)*600; starsPos[i+2] = (Math.random()-0.5)*800; }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos,3));
    scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff, size:0.5})));

    // ────────────────────────────────────────
    // LABELS (CSS2D)
    // ────────────────────────────────────────
    const labelsGroup = new THREE.Group();
    earthGroup.add(labelsGroup);
    function createLabels() {
      // Remove existing labels
      while(labelsGroup.children.length) labelsGroup.remove(labelsGroup.children[0]);
      countries.forEach(c => {
        const div = document.createElement('div');
        div.textContent = c.name;
        div.style.cssText = 'color:white; font-size:9px; font-weight:500; text-shadow:0 0 6px black; background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:4px;';
        const label = new CSS2DObject(div);
        const phi = (90 - c.lat) * Math.PI/180;
        const theta = (c.lon + 180) * Math.PI/180;
        label.position.set(52*Math.sin(phi)*Math.cos(theta), 52*Math.cos(phi), 52*Math.sin(phi)*Math.sin(theta));
        labelsGroup.add(label);
      });
    }

    // ────────────────────────────────────────
    // CAMERA FLY-TO (GSAP)
    // ────────────────────────────────────────
    function flyToCountry(country) {
      controls.autoRotate = false;
      document.getElementById('btn-auto-rotate').classList.remove('active');
      const lat = country.lat * Math.PI/180;
      const lon = country.lon * Math.PI/180;
      const targetPos = new THREE.Vector3(
        130 * Math.cos(lat) * Math.cos(lon),
        130 * Math.sin(lat),
        130 * Math.cos(lat) * Math.sin(lon)
      );
      // GSAP animate camera and controls target
      gsap.to(camera.position, {
        x: targetPos.x, y: targetPos.y, z: targetPos.z,
        duration: 1.2,
        ease: 'power2.inOut',
        onUpdate: () => controls.update()
      });
      gsap.to(controls.target, {
        x: 0, y: 0, z: 0,
        duration: 1.2,
        ease: 'power2.inOut',
        onUpdate: () => controls.update()
      });
      openPanel(country);
    }

    // ────────────────────────────────────────
    // UI & DATA PANEL
    // ────────────────────────────────────────
    const panel = document.getElementById('data-panel');
    const panelFlag = document.getElementById('panel-flag');
    const panelName = document.getElementById('panel-name');
    const statPop = document.getElementById('stat-pop');
    const statCapital = document.getElementById('stat-capital');
    const statRegion = document.getElementById('stat-region');
    const statArea = document.getElementById('stat-area');

    function openPanel(country) {
      selectedCountry = country;
      const data = countryDataMap[country.iso] || {};
      panelFlag.textContent = data.flag || '';
      panelName.textContent = data.name;
      statPop.textContent = data.population?.toLocaleString() || '—';
      statCapital.textContent = data.capital || '—';
      statRegion.textContent = data.region || '—';
      statArea.textContent = data.area ? data.area.toLocaleString() + ' km²' : '—';
      panel.classList.add('open');
    }

    function closePanel() {
      panel.classList.remove('open');
      selectedCountry = null;
    }

    // ────────────────────────────────────────
    // RAYCAST CLICK
    // ────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('click', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(idMesh);
      if (intersects.length > 0) {
        const uv = intersects[0].uv;
        const x = Math.floor(uv.x * 512);
        const y = Math.floor((1 - uv.y) * 256);
        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const id = (pixel[0] << 16) | (pixel[1] << 8) | pixel[2];
        if (id > 0 && id <= countries.length) {
          const country = countries[id-1];
          flyToCountry(country);
        }
      }
    });

    // ────────────────────────────────────────
    // SCROLL STORYTELLING (GSAP ScrollTrigger)
    // ────────────────────────────────────────
    gsap.registerPlugin(ScrollTrigger);
    const scrollContainer = document.getElementById('scroll-container');
    // We'll define story steps: each step moves camera to a continent
    const storySteps = [
      { lat: 30, lon: -40, zoom: 2.5 }, // North America
      { lat: -10, lon: -55, zoom: 2.8 }, // South America
      { lat: 50, lon: 10, zoom: 2.2 },  // Europe
      { lat: 30, lon: 80, zoom: 2.0 },  // Asia
      { lat: -25, lon: 135, zoom: 2.6 }, // Australia
      { lat: 0, lon: 20, zoom: 3.0 }    // Africa
    ];

    // Create a timeline
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: scrollContainer,
        start: 'top top',
        end: 'bottom bottom',
        scrub: 1,
        invalidateOnRefresh: true,
        onUpdate: (self) => {
          // progress 0-1
          const progress = self.progress;
          const step = Math.floor(progress * (storySteps.length-1));
          const nextStep = Math.min(step + 1, storySteps.length-1);
          const stepProgress = (progress * (storySteps.length-1)) - step;
          const s1 = storySteps[step];
          const s2 = storySteps[nextStep];
          // interpolate lat/lon and zoom
          const lat = s1.lat + (s2.lat - s1.lat) * stepProgress;
          const lon = s1.lon + (s2.lon - s1.lon) * stepProgress;
          const zoom = s1.zoom + (s2.zoom - s1.zoom) * stepProgress;
          // Convert to camera position
          const phi = (90 - lat) * Math.PI/180;
          const theta = (lon + 180) * Math.PI/180;
          const dist = 200 / zoom;
          camera.position.set(
            dist * Math.sin(phi) * Math.cos(theta),
            dist * Math.cos(phi),
            dist * Math.sin(phi) * Math.sin(theta)
          );
          controls.target.set(0,0,0);
          controls.update();
          if (controls.autoRotate) {
            controls.autoRotate = false;
            document.getElementById('btn-auto-rotate').classList.remove('active');
          }
        }
      }
    });

    // ────────────────────────────────────────
    // HEATMAP TOGGLE WITH SMOOTH TRANSITION
    // ────────────────────────────────────────
    const btnHeatmap = document.getElementById('btn-heatmap');
    btnHeatmap.addEventListener('click', () => {
      heatmapEnabled = !heatmapEnabled;
      btnHeatmap.classList.toggle('active', heatmapEnabled);
      // Animate blend uniform
      gsap.to(uniforms.blend, {
        value: heatmapEnabled ? 1.0 : 0.0,
        duration: 0.8,
        ease: 'power2.inOut'
      });
    });

    // ────────────────────────────────────────
    // SEARCH & OTHER UI
    // ────────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    const suggestions = document.getElementById('suggestions');
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      suggestions.innerHTML = '';
      if (q) {
        searchClear.classList.add('visible');
        const matches = countries.filter(c => c.name.toLowerCase().includes(q));
        matches.forEach(c => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.textContent = `${c.flag || ''} ${c.name}`;
          div.addEventListener('click', () => {
            flyToCountry(c);
            searchInput.value = '';
            suggestions.classList.remove('active');
            searchClear.classList.remove('visible');
          });
          suggestions.appendChild(div);
        });
        suggestions.classList.add('active');
      } else {
        searchClear.classList.remove('visible');
        suggestions.classList.remove('active');
      }
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      suggestions.classList.remove('active');
    });
    document.getElementById('panel-close').addEventListener('click', closePanel);
    document.getElementById('btn-reset').addEventListener('click', () => {
      gsap.to(camera.position, { x:0, y:0, z:200, duration:1, ease:'power2.inOut' });
      gsap.to(controls.target, { x:0, y:0, z:0, duration:1, ease:'power2.inOut' });
      closePanel();
      controls.autoRotate = true;
      document.getElementById('btn-auto-rotate').classList.add('active');
    });
    const btnAutoRotate = document.getElementById('btn-auto-rotate');
    btnAutoRotate.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      btnAutoRotate.classList.toggle('active', controls.autoRotate);
    });

    // ────────────────────────────────────────
    // ANIMATION LOOP
    // ────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    // STARTUP
    loadCountries().then(() => {
      buildIdMap();
      createLabels();
      // Update heat texture now that we have real data
      heatTexture = generateHeatTexture();
      uniforms.heatTexture.value = heatTexture;
      animate();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🌍 Next Level Globe ready – scroll, search, fly');
  </script>
</body>
</html>
